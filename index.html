<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deficit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <video autoplay muted loop id="bgVideo">
      <source src="anime.mp4" type="video/mp4" />
    </video>
    <div class="main">
      <!-- LEFT SIDE -->
      <div class="left">
        <h1>Decifit</h1>
        <p>Know Your calories</p>

        <div class="form">
          <input type="number" id="age" placeholder="Age" />
          <input type="number" id="height" placeholder="Height (cm)" />
          <input type="number" id="weight" placeholder="Weight (kg)" />

          <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>

          <select id="activity">
            <option value="1.2">Sedentary</option>
            <option value="1.375">Lightly Active</option>
            <option value="1.55">Moderately Active</option>
            <option value="1.725">Very Active</option>
          </select>

          <select id="goal">
            <option value="lose">Lose Fat</option>
            <option value="gain">Gain Muscle</option>
            <option value="maintain">Maintain</option>
          </select>

          <button onclick="calculate()">Calculate</button>
        </div>
        <div id="userSummary" style="display: none" class="card">
  <h3>Your Profile</h3>
  <p id="summaryText"></p>
</div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right">
  <h2 class="panel-title">Your Plan</h2>

  <div id="result" class="card">
    <div class="empty-state">
      <p>Fill the form to generate your fitness plan</p>
    </div>
  </div>

  <!-- TRACKER -->
  <div class="food-tracker card" id="tracker" style="display: none">
    <h3>🍽️ Track Your Intake</h3>

    <div class="tracker-inputs">
      <input type="text" id="foodName" placeholder="Food (e.g. rice)" />
      <input
        type="number"
        id="foodQuantity"
        placeholder="Quantity (grams / pieces)"
      />
      <button onclick="addFood()">Add Food</button>
    </div>

    <!-- PROGRESS SECTION -->
    <div class="progress-section">
      <p id="remainingCalories">Remaining: 0 kcal</p>
      <div class="progress-bar">
        <div id="calorieBar"></div>
      </div>

      <p id="remainingMacros">Protein: 0g | Carbs: 0g | Fats: 0g</p>
    </div>

    <!-- FOOD HISTORY -->
    <div class="history">
      <h4>Food History</h4>
      <ul id="foodList"></ul>
    </div>

    <!--reset button--> 
    <button onclick="resetDay()" class="reset-btn">Reset</button>
  </div>
</div>

    <script src="script.js"></script>
  </body>
</html>
